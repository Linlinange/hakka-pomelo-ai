<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f6f3ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e0c8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆：围龙屋弧线 -->
  <circle cx="200" cy="185" r="170" fill="url(#bgGrad)" />

  <!-- 围龙屋弧线层 -->
  <path d="M30 185 Q200 30 370 185" fill="none" stroke="#d4a843" stroke-width="3" opacity="0.4"/>
  <path d="M50 195 Q200 50 350 195" fill="none" stroke="#d4a843" stroke-width="2" opacity="0.3"/>
  <path d="M70 205 Q200 70 330 205" fill="none" stroke="#d4a843" stroke-width="1.5" opacity="0.2"/>

  <!-- 金柚主体：圆形+肌理 -->
  <circle cx="200" cy="185" r="95" fill="url(#goldGrad)" opacity="0.95"/>
  <circle cx="200" cy="185" r="95" fill="none" stroke="#b8860b" stroke-width="2"/>

  <!-- 柚皮纹理（简化竖线） -->
  <line x1="200" y1="90" x2="200" y2="280" stroke="#c49635" stroke-width="1" opacity="0.3"/>
  <line x1="140" y1="110" x2="140" y2="260" stroke="#c49635" stroke-width="1" opacity="0.2"/>
  <line x1="260" y1="110" x2="260" y2="260" stroke="#c49635" stroke-width="1" opacity="0.2"/>
  <line x1="110" y1="150" x2="110" y2="220" stroke="#c49635" stroke-width="1" opacity="0.15"/>
  <line x1="290" y1="150" x2="290" y2="220" stroke="#c49635" stroke-width="1" opacity="0.15"/>

  <!-- 柚顶叶蒂 -->
  <ellipse cx="200" cy="92" rx="18" ry="8" fill="#788c5d"/>
  <path d="M200 92 Q195 70 200 55 Q205 70 200 92" fill="#788c5d" opacity="0.8"/>
  <!-- 小叶 -->
  <path d="M200 65 Q185 45 175 40" fill="none" stroke="#788c5d" stroke-width="3" stroke-linecap="round"/>
  <path d="M200 65 Q215 45 225 40" fill="none" stroke="#788c5d" stroke-width="3" stroke-linecap="round"/>

  <!-- AI 芯片/网络节点（科技元素） -->
  <circle cx="165" cy="165" r="3" fill="#3d3226" opacity="0.6"/>
  <circle cx="235" cy="165" r="3" fill="#3d3226" opacity="0.6"/>
  <circle cx="200" cy="210" r="3" fill="#3d3226" opacity="0.6"/>
  <circle cx="170" cy="210" r="3" fill="#3d3226" opacity="0.4"/>
  <circle cx="230" cy="210" r="3" fill="#3d3226" opacity="0.4"/>
  <line x1="165" y1="165" x2="235" y2="165" stroke="#3d3226" stroke-width="0.8" opacity="0.3"/>
  <line x1="165" y1="165" x2="200" y2="210" stroke="#3d3226" stroke-width="0.8" opacity="0.3"/>
  <line x1="235" y1="165" x2="200" y2="210" stroke="#3d3226" stroke-width="0.8" opacity="0.3"/>

  <!-- 品牌文字 -->
  <text x="200" y="320" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="800" fill="#3d3226">客家金柚</text>
  <text x="200" y="355" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="400" fill="#9b8b6f" letter-spacing="6">AI 智 荐</text>
</svg>
