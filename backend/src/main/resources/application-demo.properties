# ============================================================
# 演示环境配置 — H2 内存数据库 + 无 Redis（零外部依赖）
# 启动方式: mvn spring-boot:run -Dspring-boot.run.profiles=demo
spring.main.allow-bean-definition-overriding=true
# ============================================================
server.port=8080

# H2 内存数据库
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:golden_pomelo_ai;MODE=MySQL;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:schema-h2.sql'
spring.datasource.username=sa
spring.datasource.password=

# 禁用 Redis
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# MyBatis-Plus
mybatis-plus.configuration.map-underscore-to-camel-case=true

# Python AI
pomelo.ai-layer.base-url=http://127.0.0.1:5000
pomelo.ai-layer.connect-timeout=5000
pomelo.ai-layer.read-timeout=30000

# Cache
pomelo.cache.recommend-ttl=1800
pomelo.cache.qa-ttl=3600

# WeChat
pomelo.wechat.app-id=
pomelo.wechat.app-secret=

logging.level.com.pomelo.ai=DEBUG
spring.data.redis.repositories.enabled=false
spring.cache.type=simple
