# ============================================================
# 客家金柚AI智荐系统 — Spring Boot 后端配置
# ============================================================

server.port=8080
spring.application.name=pomelo-ai-backend

# ---- MySQL ----
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/golden_pomelo_ai?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# ---- Redis ----
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1

# ---- MyBatis-Plus ----
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=isDeleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.configuration.map-underscore-to-camel-case=true

# ============================================================
# Python AI 算法层 (Flask) 连接配置
# ============================================================
# Flask 服务地址（默认 http://127.0.0.1:5000）
pomelo.ai-layer.base-url=${AI_LAYER_URL:http://127.0.0.1:5000}
# 连接超时 5 秒
pomelo.ai-layer.connect-timeout=5000
# 读取超时 30 秒（大模型调用较慢）
pomelo.ai-layer.read-timeout=30000

# ============================================================
# 缓存配置
# ============================================================
# 推荐结果缓存 30 分钟（1800 秒）
pomelo.cache.recommend-ttl=1800
# 问答结果缓存 1 小时（3600 秒）
pomelo.cache.qa-ttl=3600

# ============================================================
# 日志
# ============================================================
logging.level.com.pomelo.ai=DEBUG

# WeChat
pomelo.wechat.app-id=${WECHAT_APP_ID:}
pomelo.wechat.app-secret=${WECHAT_APP_SECRET:}
