server:
  port: 8080

spring:
  application:
    name: pomelo-ai-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/golden_pomelo_ai?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Python AI算法层连接 + 缓存配置
pomelo:
  ai-layer:
    base-url: ${AI_LAYER_URL:http://127.0.0.1:5000}
    connect-timeout: 5000
    read-timeout: 30000
  cache:
    recommend-ttl: 1800     # 推荐结果缓存 30 分钟
    qa-ttl: 3600            # 问答缓存 1 小时

logging:
  level:
    com.pomelo.ai: DEBUG
